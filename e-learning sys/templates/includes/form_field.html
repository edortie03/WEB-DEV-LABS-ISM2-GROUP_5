<div class="mb-3">
    <label for="{{ field.id_for_label }}" class="form-label">
        {{ field.label }}{% if field.field.required %} <span class="required-marker" aria-hidden="true">*</span>{% endif %}
    </label>
    {{ field }}
    {% if field.help_text %}
        <div class="form-text" id="{{ field.id_for_label }}_help">{{ field.help_text }}</div>
    {% endif %}
    {% if field.errors %}
        <div class="text-danger small" role="alert">{{ field.errors|striptags }}</div>
    {% endif %}
</div>
