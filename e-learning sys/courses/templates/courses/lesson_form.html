{% extends "base.html" %}
{% block title %}Add Lesson{% endblock %}
{% block content %}
<h1>Add Lesson to {{ course.title }}</h1>
<form method="post" enctype="multipart/form-data" class="col-md-6" novalidate>
    {% csrf_token %}
    {% for field in form %}
        {% include "includes/form_field.html" %}
    {% endfor %}
    <button type="submit" class="btn btn-primary">Save</button>
</form>
{% endblock %}
