{% extends "base.html" %}
{% block title %}My Courses{% endblock %}
{% block content %}
<h1>My Courses</h1>
<a href="{% url 'courses:course_create' %}" class="btn btn-primary mb-3">New Course</a>
<ul class="list-group">
    {% for course in courses %}
    <li class="list-group-item d-flex justify-content-between align-items-center">
        <a href="{% url 'courses:course_detail' course.pk %}">{{ course.title }}</a>
        <span class="badge bg-secondary">{{ course.enrollments.count }} students</span>
    </li>
    {% empty %}
    <li class="list-group-item">You haven't created any courses yet.</li>
    {% endfor %}
</ul>
{% endblock %}
