{% extends "base.html" %}
{% block title %}Quizzes{% endblock %}
{% block content %}
<h1>Quizzes for {{ course.title }}</h1>
<ul class="list-group">
    {% for quiz in quizzes %}
    <li class="list-group-item d-flex justify-content-between align-items-center">
        {{ quiz.title }}
        <a href="{% url 'quizzes:take_quiz' quiz.pk %}" class="btn btn-sm btn-primary">
            Take Quiz <span class="visually-hidden">{{ quiz.title }}</span>
        </a>
    </li>
    {% empty %}
    <li class="list-group-item">No quizzes yet.</li>
    {% endfor %}
</ul>
<a href="{% url 'courses:course_detail' course.pk %}" class="btn btn-link mt-3">Back to course</a>
{% endblock %}
