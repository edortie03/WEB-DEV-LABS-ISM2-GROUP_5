<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
    @page {
        size: 792pt 612pt;
        margin: 0;
    }
    body {
        font-family: Helvetica, Arial, sans-serif;
        color: #2b2b2b;
    }
    table.outer {
        width: 792pt;
        height: 612pt;
    }
    td.outer-cell {
        border: 12px solid #1a3c6e;
        padding: 10px;
    }
    table.inner {
        width: 100%;
        height: 570pt;
    }
    td.inner-cell {
        border: 2px solid #c9a227;
        padding: 40px;
        text-align: center;
        vertical-align: middle;
    }
    .eyebrow {
        font-size: 16px;
        letter-spacing: 4px;
        color: #c9a227;
        text-transform: uppercase;
    }
    .title {
        font-size: 38px;
        color: #1a3c6e;
        font-weight: bold;
    }
    .presented-to {
        font-size: 14px;
        color: #555555;
        text-transform: uppercase;
        letter-spacing: 2px;
    }
    .student-name {
        font-size: 32px;
        color: #2b2b2b;
        font-weight: bold;
    }
    .body-text {
        font-size: 15px;
        color: #444444;
        line-height: 1.5;
    }
    .course-title {
        font-size: 20px;
        color: #1a3c6e;
        font-weight: bold;
    }
    table.meta {
        width: 60%;
        margin: 25px auto 0 auto;
    }
    .meta-cell {
        width: 50%;
        text-align: center;
        font-size: 13px;
        color: #555555;
    }
    .meta-value {
        font-size: 15px;
        color: #2b2b2b;
        font-weight: bold;
    }
</style>
</head>
<body>
<table class="outer">
<tr>
<td class="outer-cell">
<table class="inner">
<tr>
<td class="inner-cell" valign="middle">

<p class="eyebrow">Certificate of Completion</p>
<p class="title">{{ site_name }}</p>
<p class="presented-to">This certificate is proudly presented to</p>
<p class="student-name">{{ student_name }}</p>
<p class="body-text">
for successfully completing all lessons in the course<br>
<span class="course-title">{{ course.title }}</span>
</p>

<table class="meta" align="center">
<tr>
<td class="meta-cell">
<div class="meta-value">{{ issued_at|date:"F j, Y" }}</div>
Date Issued
</td>
<td class="meta-cell">
<div class="meta-value">{{ instructor_name }}</div>
Instructor
</td>
</tr>
</table>

</td>
</tr>
</table>
</td>
</tr>
</table>
</body>
</html>
