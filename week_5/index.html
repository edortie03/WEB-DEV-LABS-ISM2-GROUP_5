<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Grade Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Student Grade Calculator</h2>

    <label>Student Name</label>
    <input type="text" id="name" placeholder="Enter student name">

    <label>Student Score (0 - 100)</label>
    <input type="number" id="scoreInput" placeholder="Enter score">

    <button onclick="calculateGrade()" id="calcBtn">Calculate Grade</button>
    <button onclick="resetForm()" class="reset">Reset</button>

    <div id="result" class="result">
        <p><strong>Name:</strong> <span id="StuName">-</span></p>
        <p><strong>Score:</strong> <span id="StuScore">-</span></p>
        <p><strong>Grade:</strong> <span id="StuGrade">-</span></p>
        <p id="error" class="error"></p>
    </div>
</div>

<script src="index.js"></script>
</body>
</html>
